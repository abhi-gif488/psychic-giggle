<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Personal Dashboard</title>

    <!-- professional Meta tags -->
    <meta name="description" content="A personalized productivity dashboard including clock, calendar, weather, quote widget, to-do list, goals tracker and more.">
    <meta name="keywords" content="dashboard, productivity, tasks, goals, weather, clock, calendar">
    <meta name="author" content="Abhishek Kumar">

    <!-- a social tags -->
    <meta property="og:title" content="Personal Dashboard">
    <meta property="og:description" content="Your personalized smart dashboard">
    <meta property="og:type" content="website">

      <!-- font awesome icons- reference taken from-W3school website: Front-Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- google fonts for the font style -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">

</head>

<body>
        <!-- Sidebar Navigation -->
    <nav class="sidebar" aria-label="Main Navigation">
        <ul>
             <li><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#todo-section"><i class="fas fa-list"></i> To-Do</a></li>
            <li><a href="#goals-section"><i class="fas fa-bullseye"></i> Goals</a></li>
            <li><a href="#notes-section"><i class="fas fa-notes-medical"></i> Private Notes</a></li>
            <li><a href="#settings-panel"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
    </nav>

    <!-- choose a simple navbar without using a nav just used header -->
    <header class="main-header" role="banner">
        <h1>Personal Dashboard</h1>
        <div class="header-buttons" role="toolbar" aria-label="Header actions">
            <button id="settings-toggle" aria-label="Open Settings"><i class="fas fa-cog"></i> Settings</button>
            <button class="header-buttons" id="theme-toggle" aria-pressed="false">Toggle Theme</button>
        </div>
    </header>

    <!-- Settings Panel -->
    <aside id="settings-panel" class="hidden" aria-label="Settings Panel" role="complementary">
        <h2>Settings</h2>
        <label><input type="checkbox" id="show-quote"> Show Quote Widget</label>

        <div class="settings-actions">
            <button id="export-data"><i class="fas fa-file-export"></i> Export Data</button>
        </div>
    </aside>

    <!-- Main Dashboard Where we can navigate... -->
    <main class="dashboard" role="main">
        <!-- Clock Widget -->
     <div class="card clock-card">
        <h2>Clock</h2>
        <div id="clock-display"></div>
    </div>

        </section>

        <!-- Calendar section -->
        <section class="widget" id="calendar-widget">
            <h2>Calendar</h2>
            <div id="calendar-container"></div>
        </section>



        <!-- Quote section -->
        <section class="widget quote" aria-label="Quote of the Day" id="quote-widget">
            <h2>Quote of the Day</h2>
            <div id="quote-display" aria-live="polite"></div>
        </section>

        <!-- To-Do list section -->
        <section id="todo-section" class="widget todo" aria-label="To-Do List">
            <h2>To-Do List</h2>
            <div class="todo-input-row">
                <input type="text" id="todo-input" placeholder="Add task" aria-label="Add task">
                <button id="add-todo" aria-label="Add todo"><i class="fas fa-plus"></i></button>
            </div>
            <ul id="todo-list" aria-live="polite"></ul>
            <button id="start-pomodoro">Start Pomodoro (25 min)</button>
        </section>

        <!-- Goals section-->
        <section id="goals-section" class="widget goals" aria-label="Goals Tracker">
            <h2>Goals Tracker</h2>
            <div class="goal-input-row">
                <input type="text" id="goal-input" placeholder="Add goal" aria-label="Add goal">
                <button id="add-goal" aria-label="Add goal"><i class="fas fa-plus"></i></button>
            </div>
            <div id="goals-list" aria-live="polite"></div>
        </section>

           <!-- Private Notes -->
        <section id="notes-section" class="widget notes">
                <h2>Private Notes</h2>

            <!-- Your Notes Textarea -->
        <textarea id="notes-text" placeholder="Write something..."></textarea>

            <!-- NEW SUBMIT BUTTON -->
                <div class="notes-actions">
        <button id="save-notes-btn">
            <i class="fas fa-save"></i> Save Notes
             </button>
             </div>
        </section>

    </main>
    <footer class="footer" role="contentinfo">
        <p>© 2025 Personal Dashboard • Built with HTML, CSS & JavaScript</p>
    </footer>

<script src="app.js" type="module"></script>
</body>
</html>
